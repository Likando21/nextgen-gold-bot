<script>
async function generateSignal() {
    try {
        const res = await fetch("https://api.gold-api.com/price/XAUUSD");

        if (!res.ok) {
            throw new Error("API failed");
        }

        const data = await res.json();

        const price = Math.round(data.price);

        const trend = price > 2325 ? "Bullish" : "Bearish";
        const action = trend === "Bullish" ? "BUY" : "SELL";

        const tp = action === "BUY" ? price + 30 : price - 30;
        const sl = action === "BUY" ? price - 20 : price + 20;

        document.getElementById("trend").innerText = trend;

        const actionEl = document.getElementById("action");
        actionEl.innerText = action;
        actionEl.className = action === "BUY" ? "buy" : "sell";

        document.getElementById("entry").innerText = price;
        document.getElementById("tp").innerText = tp;
        document.getElementById("sl").innerText = sl;

    } catch (error) {
        console.log("Error:", error);

        // fallback (so page doesn't go blank)
        document.getElementById("trend").innerText = "Offline";

        document.getElementById("action").innerText = "WAIT";
        document.getElementById("entry").innerText = "--";
        document.getElementById("tp").innerText = "--";
        document.getElementById("sl").innerText = "--";
    }
}

// update every 10 seconds
setInterval(generateSignal, 10000);
generateSignal();
</script>
