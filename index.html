<!DOCTYPE html>
<html>
<head>
  <title>NextGen Gold Bot</title>
  <style>
    body {
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }
    .green { color: #00ff88; }
    .red { color: #ff4d4d; }
  </style>
</head>

<body>

<h1>NextGen Gold Bot 🚀</h1>

<div class="card">
  <h2>📊 Market Status</h2>
  <p>Pair: XAU/USD</p>
  <p>Trend: <span id="trend"></span></p>
</div>

<div class="card">
  <h2>📡 Signal</h2>
  <p>Action: <span id="action"></span></p>
  <p>Entry: <span id="entry"></span></p>
  <p>Take Profit: <span id="tp"></span></p>
  <p>Stop Loss: <span id="sl"></span></p>
</div>

<script>
function updateBot() {
  let price = 2320 + Math.floor(Math.random() * 20);
  let isBullish = Math.random() > 0.5;

  let trend = isBullish ? "Bullish" : "Bearish";
  let action = isBullish ? "BUY" : "SELL";

  document.getElementById("trend").innerHTML =
    isBullish ? `<span class="green">${trend}</span>` :
                `<span class="red">${trend}</span>`;

  document.getElementById("action").innerHTML =
    isBullish ? `<span class="green">${action}</span>` :
                `<span class="red">${action}</span>`;

  document.getElementById("entry").innerText = price;
  document.getElementById("tp").innerText = isBullish ? price + 30 : price - 30;
  document.getElementById("sl").innerText = isBullish ? price - 20 : price + 20;
}

// update every 5 seconds
setInterval(updateBot, 5000);

// first load
updateBot();
</script>

</body>
</html>
